<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RF App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --rf-birch: #00e5ff; }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Заставка - теперь на нее можно нажать, чтобы убрать */
        #splash {
            position: fixed; inset: 0; z-index: 9999;
            background: #000; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 0.6s;
        }
        
        .nav-item { opacity: 0.3; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .nav-active { opacity: 1; color: var(--rf-birch); }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .page { position: absolute; inset: 0; padding-top: 60px; display: none; }
        .active-page { display: block; }
    </style>
</head>
<body>

    <!-- ЗАСТАВКА (Если не исчезнет сама - нажми на нее) -->
    <div id="splash" onclick="hideSplash()">
        <h1 style="color: #00ff41; font-size: 5rem; font-weight: bold; animation: pulse 2s infinite;">RF</h1>
    </div>

    <style> @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } } </style>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div class="h-screen w-full flex flex-col">
        <main class="flex-1 relative">
            
            <!-- FLOW -->
            <section id="p-flow" class="page active-page flex items-center justify-center">
                <div class="text-center">
                    <h2 class="text-white/10 text-8xl font-black italic">RF</h2>
                    <p class="mt-4 font-bold text-birch uppercase tracking-widest">Decentralized Flow</p>
                </div>
            </section>

            <!-- MESH -->
            <section id="p-mesh" class="page px-6">
                <h1 class="text-3xl font-black mb-6 italic">RF <span style="color: #00e5ff">MESH</span></h1>
                <div class="glass p-5 flex justify-between items-center" onclick="alert('P2P соединение...')">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-[#00e5ff] rounded-xl flex items-center justify-center text-black font-black">GN</div>                        <div class="ml-3">
                            <p class="font-bold text-sm">GHOST NODE</p>
                            <p class="text-[9px] text-[#00e5ff]">READY TO CONNECT</p>
                        </div>
                    </div>
                    <span>📞</span>
                </div>
            </section>

            <!-- NODE -->
            <section id="p-profile" class="page text-center px-6">
                <div class="w-20 h-20 bg-zinc-900 mx-auto rounded-3xl border border-[#00e5ff] mb-4"></div>
                <h2 class="font-bold">MY NODE</h2>
                <p id="node-id" class="text-[10px] opacity-30 mt-4 font-mono"></p>
            </section>

        </main>

        <!-- НАВИГАЦИЯ -->
        <nav class="h-20 bg-black border-t border-white/5 flex items-center justify-around pb-6">
            <div onclick="showPage('p-flow')" id="nav-flow" class="nav-item nav-active">Flow</div>
            <div onclick="showPage('p-mesh')" id="nav-mesh" class="nav-item">Mesh</div>
            <div onclick="showPage('p-profile')" id="nav-profile" class="nav-item">Node</div>
        </nav>
    </div>

    <script>
        // Функция скрытия заставки
        function hideSplash() {
            const s = document.getElementById('splash');
            if(s) {
                s.style.opacity = '0';
                setTimeout(() => s.style.display = 'none', 600);
            }
        }

        // Авто-скрытие заставки через 2 секунды
        setTimeout(hideSplash, 2000);

        // Переключение страниц
        function showPage(pageId) {
            // Скрываем все
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            
            // Показываем нужную
            document.getElementById(pageId).classList.add('active-page');
            document.getElementById('nav-' + pageId.split('-')[1]).classList.add('nav-active');
        }

        // Генерация ID
        document.getElementById('node-id').innerText = 'RF-ADDR-' + Math.random().toString(36).substr(2, 10).toUpperCase();
    </script>
</body>
</html>
