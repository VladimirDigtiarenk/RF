    <style>
        /* Tailwind CSS */
        /* Встраиваем CDN Tailwind CSS напрямую */
        /* Если Tailwind не загрузится, это будет наша последняя надежда */
        @import url('https://cdn.tailwindcss.com');

        /* Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap');

        :root {
            --rf-neon: #00ff41;
            --rf-birch: #00e5ff; /* Березовая галочка */
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            overflow: hidden;
            -webkit-user-select: none;
        }

        .birch-badge {
            background-color: var(--rf-birch);
            width: 15px; height: 15px;
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            box-shadow: 0 0 12px var(--rf-birch);
            margin-left: 6px;
        }

        .nav-item { opacity: 0.3; transition: 0.3s; }
        .nav-active { opacity: 1; color: var(--rf-birch); }

        /* Скролл Рилсов */
        .rf-scroll {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }
        .rf-scroll::-webkit-scrollbar { display: none; }
        .rf-slide {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: #050505;
        }

        /* Звонок */
        #call-ui {
            display: none;
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(40px);
            flex-direction: column; align-items: center; justify-content: space-around;
        }

        .video-main { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .video-mini { 
            position: absolute;
            bottom: 20px;
            right: 20px;            width: 100px; height: 150px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }

        /* анимация */
        .animate-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .animate-bounce { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-25%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); } 50% { transform: none; animation-timing-function: cubic-bezier(0, 0, 0.2, 1); } }

    </style>
