<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RF Messenger - P2P Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rf-accent: #007AFF; 
            --rf-bg: #f2f2f7;     
            --rf-text: #1c1c1e;   
            --rf-msg-bg: #ffffff; 
            --rf-input-bg: #f2f2f7;
            --rf-gray: #8e8e93;   
            --rf-border: #d1d1d6;
            --rf-shadow: rgba(0,0,0,0.1);
        }

        body { 
            background: var(--rf-bg); 
            color: var(--rf-text); 
            font-family: 'Inter', sans-serif;
            margin: 0; overflow: hidden; 
        }

        .page { position: absolute; inset: 0; display: none; padding-top: 70px; background: var(--rf-bg); }
        .active-page { display: block; }

        .nav-item { color: var(--rf-gray); font-size: 11px; font-weight: 700; text-transform: uppercase; transition: 0.3s; cursor: pointer; }
        .nav-active { color: var(--rf-accent); }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--rf-border);
            z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }

        /* Стиль чата */
        .chat-container {
            height: calc(100vh - 70px - 80px - 60px); 
            overflow-y: auto;
            padding: 0 15px;
            display: flex;
            flex-direction: column-reverse; 
        }
        .message {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
            margin-bottom: 10px;
            font-size: 15px;
            word-wrap: break-word;
        }
        .my-message {
            background: var(--rf-accent);
            color: #fff;
            border-bottom-right-radius: 5px;
            margin-left: auto;
        }        .other-message {
            background: var(--rf-msg-bg);
            border: 1px solid var(--rf-border);
            border-bottom-left-radius: 5px;
            margin-right: auto;
        }
        .message-time {
            font-size: 10px;
            color: var(--rf-gray);
            opacity: 0.7;
            margin-top: 3px;
        }
        .chat-input-area {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            padding: 15px; border-top: 1px solid var(--rf-border);
            display: flex; align-items: center;
        }
        .chat-input {
            flex-grow: 1;
            background: var(--rf-input-bg);
            border: none;
            border-radius: 15px;
            padding: 10px 15px;
            font-size: 15px;
            outline: none;
        }
        .send-button {
            background: var(--rf-accent);
            color: #fff;
            border: none;
            border-radius: 15px;
            padding: 10px 18px;
            font-weight: bold;
            margin-left: 10px;
            cursor: pointer;
        }

        .lang-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.08); padding: 4px 10px; border-radius: 15px;
            font-size: 12px; font-weight: bold; cursor: pointer;
        }
        
        /* Иконки для навигации */
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <!-- ЗАГОЛОВОК -->
    <header id="app-header" class="header">
        <h1 id="page-title" class="text-lg font-bold"></h1>
        <div class="flex items-center">
            <button id="header-action-btn" class="text-lg mr-4" onclick="showChatAction()">+</button>
            <img src="https://i.pravatar.cc/40?u=myid" class="w-10 h-10 rounded-full border-2 border-[var(--rf-accent)]" onclick="showPage('p-profile')">
        </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="flex-1 relative">
        <!-- СТРАНИЦА NETWORK (Flow) -->
        <section id="p-flow" class="page">
            <div class="text-center px-6">
                <h2 class="text-4xl font-bold mb-4">RF Network</h2>
                <p class="text-var(--rf-gray) mb-8">Децентрализованная сеть. Твой телефон — это сервер.</p>
                <div class="text-center font-bold text-lg mb-4">Статус сети:</div>
                <div class="flex justify-center gap-4">
                    <div class="text-center">
                        <span class="text-lg font-bold text-[var(--rf-accent)]">●</span>
                        <p class="text-xs text-[var(--rf-gray)] uppercase">GUN.JS</p>
                    </div>
                    <div class="text-center">
                        <span class="text-lg font-bold text-[var(--rf-gray)]">●</span>
                        <p class="text-xs text-[var(--rf-gray)] uppercase">P2P</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- СТРАНИЦА MESH (ЧАТЫ) -->
        <section id="p-mesh" class="page active-page">
            <div id="chat-list" class="px-4">

                <div class="flex items-center p-3 hover:bg-gray-50 rounded-2xl transition mb-3" onclick="openChat('GHOST NODE')">
                    <div class="w-12 h-12 bg-[var(--rf-accent)] rounded-full flex items-center justify-center text-white font-bold text-sm">RF</div>
