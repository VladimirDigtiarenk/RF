<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RF: SUPREME EMPIRE V17</title>
    
    <script src="https://tailwindcss.com"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://unpkg.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { --rf-accent: #007AFF; --rf-gold: #FFD700; }
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; margin: 0; overflow: hidden; }

        /* Мгновенная загрузка страниц */
        .page { position: absolute; inset: 0; display: none; padding-top: 100px; padding-bottom: 100px; overflow-y: auto; background: #fff; }
        .active-page { display: block; animation: fastIn 0.2s ease-out; }
        @keyframes fastIn { from { opacity: 0; } to { opacity: 1; } }

        /* Плавный прогресс-бар */
        #loader-wrap { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        #progress-bar { width: 200px; height: 3px; background: #f0f0f0; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        #progress-fill { width: 0%; height: 100%; background: #000; transition: 0.3s; }
        
        .founder-tag { background: #000; color: var(--rf-gold); font-size: 8px; padding: 2px 8px; border-radius: 6px; font-weight: 900; }
        .glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-bottom: 0.5px solid #eee; z-index: 1000; }
    </style>
</head>
<body>

    <!-- УМНЫЙ ЗАГРУЗЧИК -->
    <div id="loader-wrap">
        <h1 class="text-6xl font-black italic tracking-tighter">RF</h1>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <p id="loader-status" class="mt-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">Инициализация ноды...</p>
    </div>

    <!-- ГОЛОС ОСНОВАТЕЛЯ -->
    <div id="global-alert" class="fixed top-6 inset-x-4 z-[10001] bg-black text-white p-6 rounded-[30px] border border-yellow-500 shadow-2xl hidden animate-bounce">
        <div class="flex items-center gap-2 mb-2 text-yellow-400">
            <i data-lucide="shield-check" class="w-4 h-4"></i>
            <span class="text-[10px] font-black uppercase tracking-widest">RF Founder Voice</span>
        </div>
        <p id="alert-text" class="text-sm font-bold"></p>
        <button onclick="this.parentElement.style.display='none'" class="mt-4 text-[10px] opacity-50 uppercase font-black">Принято</button>
    </div>

    <!-- ШАПКА -->
    <header class="fixed top-0 inset-x-0 h-[100px] glass flex items-end justify-between px-6 pb-4">
        <div class="flex flex-col">
            <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Global Protocol</span>
            <h1 id="header-title" class="text-2xl font-black italic tracking-tighter uppercase">FLOW</h1>
        </div>
        <img id="my-avatar" class="w-10 h-10 rounded-full border border-gray-100 object-cover bg-gray-50" onclick="showPage('profile')">
    </header>

    <main class="h-screen relative">
        <section id="p-flow" class="page active-page">
            <div id="feed" class="flex flex-col pb-24"></div>
        </section>

        <section id="p-direct" class="page px-6">
            <div class="flex gap-2 my-4">
                <input type="text" id="search-u" class="flex-1 p-5 bg-gray-50 rounded-[24px] text-sm outline-none" placeholder="Поиск ника...">
                <button onclick="openChat(document.getElementById('search-u').value)" class="w-14 h-14 bg-black text-white rounded-[24px] flex items-center justify-center"><i data-lucide="message-square"></i></button>
            </div>
            <div id="chat-list"></div>
        </section>

        <section id="p-profile" class="page px-8 text-center">
            <div class="mt-12 flex flex-col items-center">
                <div class="relative">
                    <img id="prof-img" class="w-32 h-32 rounded-full border-4 border-white shadow-2xl">
                    <div id="v-icon" class="hidden absolute bottom-2 right-2 w-8 h-8 bg-blue-400 rounded-full border-4 border-white flex items-center justify-center text-xs text-white font-black">✓</div>
                </div>
                <h2 class="text-3xl font-black italic mt-4" id="prof-name">Username</h2>
                <div id="founder-tag" class="hidden founder-tag">ОСНОВАТЕЛЬ</div>

                <div id="founder-controls" class="hidden w-full mt-6 space-y-2 p-4 bg-yellow-50 rounded-[30px]">
                    <input id="broadcast-msg" class="w-full p-4 bg-white rounded-2xl text-xs outline-none" placeholder="Сообщение всем...">
                    <button onclick="sendEmpireBroadcast()" class="w-full p-4 bg-yellow-400 text-black font-black rounded-2xl text-[10px] uppercase">Оповестить</button>
                </div>
                
                <button onclick="copyWallet()" class="mt-6 w-full p-5 bg-black text-yellow-400 rounded-[24px] font-black text-xs border border-yellow-400 flex items-center justify-center gap-2">
                    <i data-lucide="gem" class="w-4 h-4"></i> ПОДДЕРЖАТЬ RF (USDT)
                </button>

                <div class="flex gap-4 mt-8 w-full">
                    <div class="flex-1 p-4 bg-gray-50 rounded-[28px]"><p class="font-black text-xl" id="follower-count">0</p><p class="text-[9px] text-gray-400 font-bold uppercase">Followers</p></div>
                    <div class="flex-1 p-4 bg-gray-50 rounded-[28px]"><p class="font-black text-xl" id="following-count">0</p><p class="text-[9px] text-gray-400 font-bold uppercase">Following</p></div>
                </div>
                <div id="prof-grid" class="grid grid-cols-3 gap-1 mt-8 pb-24 w-full"></div>
            </div>
        </section>
    </main>

    <div id="chat-modal" class="fixed inset-0 bg-white z-[2000] hidden flex flex-col">
        <header class="h-[100px] glass flex items-end justify-between px-6 pb-4">
            <button onclick="document.getElementById('chat-modal').classList.add('hidden')"><i data-lucide="chevron-left"></i></button>
            <h2 id="chat-title" class="text-lg font-black uppercase">Chat</h2>
            <div class="w-6"></div>
        </header>
        <div id="chat-msgs" class="flex-1 overflow-y-auto p-6 flex flex-col gap-3"></div>
        <div class="p-6 glass flex gap-2">
            <input type="text" id="dm-input" class="flex-1 p-4 bg-gray-50 rounded-2xl text-sm outline-none" placeholder="Сообщение...">
            <button onclick="sendDM()" class="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center"><i data-lucide="send"></i></button>
        </div>
    </div>

    <label class="fixed right-6 bottom-28 w-16 h-16 bg-black text-white rounded-full flex items-center justify-center shadow-2xl z-50 active:scale-90 transition cursor-pointer">
        <i data-lucide="camera"></i>
        <input type="file" id="media-input" class="hidden" accept="image/*" onchange="uploadSecure(this)">
    </label>

    <nav class="fixed bottom-0 inset-x-0 h-[95px] glass flex justify-around items-center pb-8">
        <button onclick="showPage('flow')"><i data-lucide="layout-grid"></i></button>
        <button onclick="showPage('direct')"><i data-lucide="send"></i></button>
        <button onclick="showPage('profile')"><i data-lucide="user"></i></button>
    </nav>

    <!-- AUTH -->
    <div id="auth-screen" class="fixed inset-0 bg-white z-[5000] p-10 flex flex-col justify-center hidden">
        <h2 class="text-5xl font-black italic tracking-tighter mb-10">RF</h2>
        <input type="text" id="node-alias" class="w-full p-6 bg-gray-50 rounded-[24px] font-bold mb-4 outline-none" placeholder="Username">
        <input type="password" id="node-pass" class="w-full p-6 bg-gray-50 rounded-[24px] font-bold mb-8 outline-none" placeholder="Password">
        <button onclick="authNode()" class="w-full p-6 bg-black text-white rounded-[24px] font-black shadow-xl">ACTIVATE</button>
    </div>

    <script>
        // Инициализация Gun с несколькими релеями для скорости
        const gun = Gun(['https://herokuapp.com', 'https://herokuapp.com']);
        const user = gun.user().recall({localStorage: true});
        const FOUNDER = "Vladimir Digtiarenko";
        const WALLET = "TPiP2CXwrgZUMNLAShfru6NGNwmqAXgi8h";
        let myNick = "", activeChat = "", nsfwModel = null;

        // Пошаговый лоадер
        const progress = (p, text) => {
            document.getElementById('progress-fill').style.width = p + '%';
            document.getElementById('loader-status').innerText = text;
        };

        window.onload = async () => {
            progress(20, "Подключение к Mesh...");
            lucide.createIcons();
            
            setTimeout(() => {
                progress(50, "Синхронизация профиля...");
                if (!user.is) {
                    document.getElementById('loader-wrap').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader-wrap').style.display = 'none';
                        document.getElementById('auth-screen').classList.remove('hidden');
                    }, 500);
                } else {
                    startApp();
                }
            }, 800);
        };

        async function startApp() {
            myNick = user.is.alias;
            const av = `https://dicebear.com{myNick}`;
            document.getElementById('prof-img').src = av;
            document.getElementById('my-avatar').src = av;
            document.getElementById('prof-name').innerText = myNick;
            document.getElementById('auth-screen').classList.add('hidden');

            progress(80, "Загрузка ленты...");
            
            if(myNick === FOUNDER) {
                document.getElementById('founder-tag').classList.remove('hidden');
                document.getElementById('founder-controls').classList.remove('hidden');
                document.getElementById('v-icon').classList.remove('hidden');
            } else {
                gun.get('rf_fol_v17').get(FOUNDER).get(myNick).put(true);
                gun.get('rf_following_v17').get(myNick).get(FOUNDER).put(true);
            }

            // Фоновая загрузка тяжелого ИИ (не блокирует вход)
            setTimeout(async () => {
                const script = document.createElement('script');
                script.src = "https://jsdelivr.net";
                script.onload = async () => {
                    const tf = document.createElement('script');
                    tf.src = "https://jsdelivr.net";
                    tf.onload = async () => { nsfwModel = await nsfwjs.load(); console.log("AI Shield Background Ready"); };
                    document.head.appendChild(tf);
                };
                document.head.appendChild(script);
            }, 2000);

            sync();
            
            progress(100, "Готово");
            setTimeout(() => {
                document.getElementById('loader-wrap').style.opacity = '0';
                setTimeout(() => document.getElementById('loader-wrap').style.display = 'none', 500);
            }, 500);
        }

        function sync() {
            const seen = new Set();
            gun.get('rf_v17_posts').map().on((data, id) => {
                if(!data || !data.img || seen.has(id)) return;
                seen.add(id);
                const isF = data.by === FOUNDER;
                const html = `<div class="mb-4 border-b border-gray-50 pb-4">
                    <div class="flex items-center p-4 gap-3">
                        <img src="https://dicebear.com{data.by}" class="w-8 h-8 rounded-full border">
                        <span class="font-bold text-sm flex items-center">${data.by} ${isF ? '<div class="verify-badge">✓</div>' : ''}</span>
                    </div>
                    <img src="${data.img}" class="w-full aspect-square object-cover shadow-sm">
                </div>`;
                document.getElementById('feed').insertAdjacentHTML('afterbegin', html);
                if(data.by === myNick) document.getElementById('prof-grid').insertAdjacentHTML('afterbegin', `<img src="${data.img}" class="aspect-square object-cover">`);
            });

            gun.get('rf_global_v17').on(data => {
                if(data && data.txt) {
                    document.getElementById('alert-text').innerText = data.txt;
                    document.getElementById('global-alert').style.display = 'block';
                    setTimeout(() => document.getElementById('global-alert').style.display = 'none', 10000);
                }
            });

            gun.get('rf_fol_v17').get(myNick).on(f => {
                const count = f ? Object.keys(f).filter(k => f[k]).length : 0;
                document.getElementById('follower-count').innerText = count;
            });
            gun.get('rf_following_v17').get(myNick).on(f => {
                const count = f ? Object.keys(f).filter(k => f[k]).length : 0;
                document.getElementById('following-count').innerText = count;
            });
        }

        async function uploadSecure(input) {
            const file = input.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const img = new Image();
                img.src = e.target.result;
                await new Promise(r => img.onload = r);
                
                // Сжатие для скорости
                const canvas = document.createElement('canvas');
                canvas.width = 1000; canvas.height = 1000;
                canvas.getContext('2d').drawImage(img, 0, 0, 1000, 1000);
                const optimized = canvas.toDataURL('image/jpeg', 0.7);

                if(myNick !== FOUNDER && nsfwModel) {
                    const pred = await nsfwModel.classify(img);
                    if(pred.some(p => (p.className==='Porn'||p.className==='Hentai') && p.probability > 0.6)) return alert("Content Blocked!");
                }

                gun.get('rf_v17_posts').set({ id: Gun.text.random(), img: optimized, by: myNick, at: Date.now() });
                showPage('flow');
            };
            reader.readAsDataURL(file);
        }

        function authNode() {
            const a = document.getElementById('node-alias').value;
            const p = document.getElementById('node-pass').value;
            user.auth(a, p, (ack) => {
                if (ack.err) user.create(a, p, () => {
                    user.auth(a, p, () => location.reload());
                });
                else location.reload();
            });
        }

        function openChat(name) {
            if(!name || name === myNick) return;
            activeChat = name;
            document.getElementById('chat-modal').classList.remove('hidden');
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-msgs').innerHTML = "";
            const chatId = [myNick, name].sort().join('_');
            gun.get('rf_dm_v17').get(chatId).map().once(m => {
                if(!m || !m.txt) return;
                const h = `<div class="p-4 rounded-3xl text-xs max-w-[85%] ${m.by===myNick?'bg-black text-white self-end':'bg-gray-100 self-start'}">${m.txt}</div>`;
                document.getElementById('chat-msgs').insertAdjacentHTML('beforeend', h);
                document.getElementById('chat-msgs').scrollTop = 99999;
            });
        }

        function sendDM() {
            const i = document.getElementById('dm-input');
            const chatId = [myNick, activeChat].sort().join('_');
            gun.get('rf_dm_v17').get(chatId).set({ by: myNick, txt: i.value });
            i.value = "";
        }

        function sendEmpireBroadcast() {
            const txt = document.getElementById('broadcast-msg').value;
            if(txt) gun.get('rf_global_v17').put({txt: txt, at: Date.now()});
            document.getElementById('broadcast-msg').value = "";
        }

        function copyWallet() {
            navigator.clipboard.writeText(WALLET).then(() => alert("Bybit Address (TRC20) Copied!"));
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('p-'+id).classList.add('active-page');
            document.getElementById('header-title').innerText = id.toUpperCase();
            lucide.createIcons();
        }
    </script>
</body>
</html>
